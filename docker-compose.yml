services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: journeysync
      POSTGRES_PASSWORD: journeysync
      POSTGRES_DB: journeysync
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journeysync"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: ./apps/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://journeysync:journeysync@db:5432/journeysync
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
volumes:
  pgdata:
